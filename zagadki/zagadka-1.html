<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zagadka 1 – Wielkie Podchody</title>
  <link rel="stylesheet" href="../css/riddle.css">
</head>
<body>
  <div class="sun"></div>
  <div class="cloud cloud-a"></div>
  <div class="cloud cloud-b"></div>
  <div class="tree tree-l"><div class="tree-top"></div><div class="tree-top tree-top-2"></div><div class="tree-trunk"></div></div>
  <div class="tree tree-r"><div class="tree-top"></div><div class="tree-top tree-top-2"></div><div class="tree-trunk"></div></div>

  <div class="card">

    <span class="riddle-emoji">1</span>
    <h1>Zagadka 1</h1>

    <div class="input-group">
      <input type="text" id="answer" placeholder="Wpisz odpowiedź..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="check-btn" onclick="checkAnswer(
        ['43', 43],
        'answer', 'result',
        'Następne zadanie znajduje się na drzwiach do klasy IV!',
      )">Sprawdź!</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script src="../js/riddle.js"></script>
  <script>
    document.getElementById('answer').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.querySelector('.check-btn').click();
    });
  </script>
</body>
</html>
